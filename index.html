<!doctype html>

    <!--app-head-->

    <!-- Static fallback OG tags for scrapers that skip JS.

    <meta name="description" content="Access 60+ powerful, free online tools for images, PDFs, SEO, and more. Fast, secure, and 100% private." />

    <meta property="og:site_name" content="Sohelix" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sohelix.com/" />
    <meta property="og:title" content="Sohelix - Free Online Tools for Everyone" />
    <meta property="og:description" content="Access 60+ powerful, free online tools for images, PDFs, SEO, and more. Fast, secure, and 100% private." />

    <script>
      if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark");
      }
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>

      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

  <body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-200">
    <div id="root"><!--app-html--></div>
