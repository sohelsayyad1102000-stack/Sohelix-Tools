<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <style>
      :root {
        --bg-gray-50: #f9fafb;
        --bg-dark: #030712;
      }
      body { background-color: var(--bg-gray-50); }
      .dark body { background-color: var(--bg-dark); }
      .hero-section { min-height: 400px; padding-top: 6rem; text-align: center; }
      .hero-title { font-size: 3rem; font-weight: 900; line-height: 1.2; letter-spacing: -0.025em; color: #111827; }
      .dark .hero-title { color: #ffffff; }
    </style>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JD5BBCTBZG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JD5BBCTBZG');
    </script>
    <!--app-head-->
    <script>
      (function() {
        try {
          const theme = localStorage.getItem("theme");
          const supportDarkMode = window.matchMedia("(prefers-color-scheme: dark)").matches === true;
          if (theme === "dark" || (!theme && supportDarkMode)) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-200">
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.tsx" fetchpriority="high"></script>
  </body>
</html>
